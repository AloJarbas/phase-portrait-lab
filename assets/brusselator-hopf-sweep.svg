<text x="980.00" y="214.00" fill="#dce7f3" font-size="15" font-family="Helvetica, Arial, sans-serif">B = 1.60 → stable spiral</text>
<text x="996.00" y="234.00" fill="#9fb3c8" font-size="13" font-family="Helvetica, Arial, sans-serif">λ = -0.20+0.98i at (x*, y*) = (1.0, 1.6)</text>
