<text x="100.00" y="736.00" fill="#dce7f3" font-size="15" font-family="Helvetica, Arial, sans-serif">The imaginary part stays near one, so the turning tendency remains visible while the real part decides damping versus growth.</text>
<text x="100.00" y="758.00" fill="#dce7f3" font-size="15" font-family="Helvetica, Arial, sans-serif">That is the local bridge from a calm fixed point to a self-sustained oscillation.</text>
